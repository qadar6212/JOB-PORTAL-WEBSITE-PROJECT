<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply for Job | JobNest</title>
  <link rel="stylesheet" href="job apply.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>   
<body>

  <div class="apply-container">

    <!-- Logo -->
    <div class="logo">
      <img src="c:\Users\hp\Videos\photo for fun\download (1).svg" alt="JobNest Logo">
      <h1>JobNest</h1>
      <p>Apply for your next opportunity</p>
    </div>

    <!-- Apply Form -->
    <form class="apply-form" action="YOUR-LINK-HERE" method="post">
      <h2>Job Application</h2>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="+252 ..." required>
      </div>

      <div class="form-group">
        <label>Upload CV</label>
        <input type="file">
      </div>

      <div class="form-group">
        <label>About You</label>
        <textarea placeholder="Short description about yourself"></textarea>
      </div>

      <button type="submit">Submit Application</button>
    </form>

    <footer>
      © 2026 JobNest. All rights reserved.
    </footer>

  </div>

</body>
</html>
