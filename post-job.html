<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post a Job | Job Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}
body{
    background: #f4f6f8; /* soft background */
    color:#333;
}

/* HEADER */
.header{
    background:#007bff; /* blue header */
    color:#fff;
    padding:20px;
    text-align:center;
    animation: slideDown 1s ease;
}
.header p{
    color: #e0f0ff;
}
@keyframes slideDown{
    from{transform:translateY(-50px);opacity:0}
    to{transform:translateY(0);opacity:1}
}

/* FORM CARD */
.container{
    max-width:900px;
    margin:40px auto;
    background:#fff;
    border-radius:12px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.1); /* softer shadow */
    animation: fadeUp 1.2s ease;
}
@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    color:#007bff; /* match header */
}

.form-group{
    margin-bottom:18px;
}
.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:6px;
    color:#333;
}
.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
    transition:.3s;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{
    border-color:#007bff;
}

/* TWO COLUMN */
.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
@media(max-width:700px){
    .row{grid-template-columns:1fr}
}

/* BUTTON */
.btn{
    background:#007bff; /* blue button */
    color:#fff;
    border:none;
    padding:14px;
    width:100%;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:.4s;
}
.btn:hover{
    background:#0056b3; /* darker blue on hover */
    letter-spacing:1px;
}

/* FOOTER */
footer{
    background:#041983; /* dark blue footer */
    color:#ccc;
    margin-top:60px;
    padding:30px 10px;
}
.footer-content{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:25px;
}
footer h4{
    color:#fff;
    margin-bottom:10px;
}
footer ul{
    list-style:none;
}
footer ul li{
    margin-bottom:8px;
}
footer a{
    color:#ccc;
    text-decoration:none;
    transition:.3s;
}
footer a:hover{
    color:#00c6ff;
}
.social i{
    font-size:20px;
    margin-right:12px;
    transition:.3s;
}
.social i:hover{
    color:#00c6ff;
    transform:scale(1.2);
}
.copy{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#aaa;
}

</style>
</head>

<body>

<div class="header">
    <h1><i class="fa-solid fa-briefcase"></i> Post a New Job</h1>
    <p>Ku dar shaqo cusub Job Portal-ka</p>
</div>

<div class="container">
    <h2>Job Information</h2>

    <form>
        <div class="row">
            <div class="form-group">
                <label>Job Title</label>
                <input type="text" placeholder="e.g. Web Developer">
            </div>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" placeholder="Company Name">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Job Type</label>
                <select>
                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Remote</option>
                    <option>Internship</option>
                </select>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" placeholder="City / Country">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Salary</label>
                <input type="text" placeholder="$500 - $1200">
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date">
            </div>
        </div>

        <div class="form-group">
            <label>Job Description</label>
            <textarea rows="5" placeholder="Sharaxaad shaqada..."></textarea>
        </div>

        <button class="btn"><i class="fa-solid fa-upload"></i> Post Job</button>
    </form>
</div>

<footer>
    <div class="footer-content">
        <div>
            <h4>Job Portal</h4>
            <p>Platform kuu sahlaya helidda iyo soo gelinta shaqooyin tayo leh.</p>
        </div>

        <div>
            <h4>Quick Links</h4>
            <ul>
                <li><a href="home-pae.html">Home</a></li>
                <li><a href="#">Jobs</a></li>
                <li><a href="#">Post Job</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <div>
            <h4>Follow Us</h4>
            <div class="social">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </div>

    <div class="copy">
        © 2026 Job Portal. All Rights Reserved.
    </div>
</footer>

</body>
</html>
